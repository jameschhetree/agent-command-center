<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Report Archive - Agent Command Center</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #0a0a0a;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f5f5f7;
    --text-secondary: rgba(255,255,255,0.5);
    --indigo: #818cf8;
    --violet: #a78bfa;
    --emerald: #34d399;
    --rose: #fb7185;
    --amber: #fbbf24;
    --cyan: #22d3ee;
    --radius: 16px;
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80%; height: 80%;
    background: radial-gradient(ellipse, rgba(129,140,248,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: ambientDrift 20s ease-in-out infinite alternate;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -20%;
    width: 70%; height: 70%;
    background: radial-gradient(ellipse, rgba(167,139,250,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: ambientDrift 25s ease-in-out infinite alternate-reverse;
  }

  @keyframes ambientDrift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(5%, 3%) scale(1.1); }
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .page-header {
    text-align: center;
    padding: 32px 0 40px;
    opacity: 0;
    animation: fadeUp 0.8s var(--ease-smooth) forwards;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 20px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--text); }
  .back-link svg { width: 16px; height: 16px; }

  .page-header h1 {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 800;
    letter-spacing: -1.5px;
    background: linear-gradient(135deg, #818cf8 0%, #a78bfa 30%, #f5f5f7 60%, #818cf8 100%);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 8s ease infinite;
    line-height: 1.1;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .report-count {
    font-size: 15px;
    color: var(--text-secondary);
    margin-top: 12px;
    font-weight: 500;
  }
  .report-count strong {
    color: var(--indigo);
    font-weight: 700;
  }

  /* FILTERS */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s var(--ease-smooth) 0.15s forwards;
  }

  .filter-btn {
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.25s var(--ease-smooth);
    font-family: inherit;
  }
  .filter-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
    background: var(--surface-hover);
  }
  .filter-btn.active {
    background: rgba(129,140,248,0.15);
    border-color: rgba(129,140,248,0.4);
    color: var(--indigo);
  }

  /* REPORT GRID */
  .reports-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    opacity: 0;
    animation: fadeUp 0.8s var(--ease-smooth) 0.3s forwards;
  }
  @media (max-width: 900px) {
    .reports-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .reports-grid { grid-template-columns: 1fr; }
  }

  .report-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: all 0.35s var(--ease-smooth);
    position: relative;
    overflow: hidden;
    cursor: default;
  }
  .report-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--card-accent, var(--indigo)), transparent);
    opacity: 0.6;
  }
  .report-card:hover {
    background: var(--surface-hover);
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px -10px rgba(0,0,0,0.5);
  }

  .report-card .category-tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .report-card .filename {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.2px;
    line-height: 1.4;
    margin-bottom: 12px;
    word-break: break-word;
    color: var(--text);
  }

  .report-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .report-meta span {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-size: 15px;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  @media (pointer: coarse) {
    .report-card { min-height: 120px; }
    .filter-btn { padding: 10px 18px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="container">

  <header class="page-header">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      Back to Command Center
    </a>
    <h1>REPORT ARCHIVE</h1>
    <div class="report-count" id="reportCount">Loading reports...</div>
  </header>

  <div class="filters" id="filters"></div>

  <div class="reports-grid" id="reportsGrid"></div>

</div>

<script>
(function() {
  'use strict';

  const CATEGORY_COLORS = {
    'SA-Brief':      { bg: 'rgba(251,113,133,0.12)', text: '#fb7185', accent: '#fb7185' },
    'CompetitorIQ':  { bg: 'rgba(129,140,248,0.12)', text: '#818cf8', accent: '#818cf8' },
    'Daily-Report':  { bg: 'rgba(52,211,153,0.12)',  text: '#34d399', accent: '#34d399' },
    'LiveNation':    { bg: 'rgba(251,191,36,0.12)',  text: '#fbbf24', accent: '#fbbf24' },
    'DMV-Wholesale': { bg: 'rgba(167,139,250,0.12)', text: '#a78bfa', accent: '#a78bfa' },
    'HighLife':      { bg: 'rgba(34,211,238,0.12)',  text: '#22d3ee', accent: '#22d3ee' },
    'Apna-Pizza':    { bg: 'rgba(251,191,36,0.12)',  text: '#fbbf24', accent: '#fbbf24' },
    'Alti':          { bg: 'rgba(129,140,248,0.12)', text: '#818cf8', accent: '#818cf8' },
    'Demo':          { bg: 'rgba(255,255,255,0.06)', text: 'rgba(255,255,255,0.5)', accent: '#818cf8' },
    'Presentation':  { bg: 'rgba(167,139,250,0.12)', text: '#a78bfa', accent: '#a78bfa' },
    'Brief':         { bg: 'rgba(251,113,133,0.12)', text: '#fb7185', accent: '#fb7185' },
    'Report':        { bg: 'rgba(52,211,153,0.12)',  text: '#34d399', accent: '#34d399' },
    'Other':         { bg: 'rgba(255,255,255,0.06)', text: 'rgba(255,255,255,0.5)', accent: '#818cf8' }
  };

  let allReports = [];
  let activeFilter = 'All';

  function formatDate(iso) {
    const d = new Date(iso);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function formatSize(kb) {
    if (kb >= 1024) return (kb / 1024).toFixed(1) + ' MB';
    return kb + ' KB';
  }

  function getColorInfo(category) {
    return CATEGORY_COLORS[category] || CATEGORY_COLORS['Other'];
  }

  function renderFilters() {
    const categories = ['All', ...new Set(allReports.map(r => r.category))].sort((a, b) => {
      if (a === 'All') return -1;
      if (b === 'All') return 1;
      return a.localeCompare(b);
    });

    const container = document.getElementById('filters');
    container.innerHTML = categories.map(cat => {
      const cls = cat === activeFilter ? 'filter-btn active' : 'filter-btn';
      return '<button class="' + cls + '" data-cat="' + cat + '">' + cat + '</button>';
    }).join('');

    container.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        activeFilter = this.getAttribute('data-cat');
        renderFilters();
        renderReports();
      });
    });
  }

  function renderReports() {
    const filtered = activeFilter === 'All'
      ? allReports
      : allReports.filter(r => r.category === activeFilter);

    const countEl = document.getElementById('reportCount');
    if (activeFilter === 'All') {
      countEl.innerHTML = '<strong>' + allReports.length + '</strong> reports generated';
    } else {
      countEl.innerHTML = '<strong>' + filtered.length + '</strong> ' + activeFilter + ' reports';
    }

    const grid = document.getElementById('reportsGrid');

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="no-results">No reports found for this category.</div>';
      return;
    }

    grid.innerHTML = filtered.map(function(r) {
      const c = getColorInfo(r.category);
      return '<div class="report-card" style="--card-accent: ' + c.accent + '">' +
        '<span class="category-tag" style="background:' + c.bg + ';color:' + c.text + '">' + r.category + '</span>' +
        '<div class="filename">' + r.name + '</div>' +
        '<div class="report-meta">' +
          '<span>' + formatDate(r.mtime) + '</span>' +
          '<span>' + formatSize(r.size_kb) + '</span>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // Load manifest
  fetch('reports-manifest.json')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      allReports = data;
      renderFilters();
      renderReports();
    })
    .catch(function(err) {
      document.getElementById('reportCount').textContent = 'Failed to load report manifest.';
      console.error('Manifest load error:', err);
    });

})();
</script>

</body>
</html>
